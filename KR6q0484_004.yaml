body:
  text: 書記傳一録洞山宗瑞州洞山良價悟本禪師青四雲岩晟嗣僧問三身之中阿那身不墮衆數師曰吾常於此切後有持此問曹山先師道吾常於此切意作麼生山云要頭便斫去又問雪峰峰以拄杖打云我亦曾到洞山來拈云至實不華至詞不飭洞山答處非親從那畔透底翻身來何能示此銀壁千尋之句即使木人聞之直得汗流汁背矣所以後來兩箇漢被僧問著亦竟無容措語秪如今日還可商量麼咄惜取舌頭好洞山因雪峰上問訊師曰入門須有語不得道早箇入了也峰曰某甲無口師曰無口且從還我眼來峰無語雲居別前語云待某甲有口即道拈云詗上座見老漢才問時向道語即不無秪恐和尚不信是家裏話洞山上堂有一人在千萬人中不背一人不向一人你道此人具何面目雲居出曰某甲參堂拈云洞山滿掌撒珍珠遍地全無落半顆雲居當臺抽寶鏡森羅齊共納殊形父子敲唱妙挾圓機可謂天然首尾雖然秪如此人面目畢竟又作麼生玉兔未臨光透戶金烏常照不當門洞山因僧問欲見和尚本來師如何得見師曰年牙相似即無阻矣僧擬進語師曰不躡前蹤別請一問僧無對雲居代云恁麼則不見和尚本來師也拈云若是本來師莫道年牙相似即恐名貌亦不相似何故若相似何異泥牛所以老漢不待伊進語便撥轉機輪可謂巧於回互獨惜者僧當面錯過耳秪如雲居代語是躡前蹤不躡前蹤伶利者請試著眼洞山因雪峰般柴次乃於面前拋下一束師曰重多少峰曰盡大地人提不起師曰爭得到者裏峰無語拈云雪峰臂腕儘有千尋舌頭僅可寸半洞山眼察秋毫爭奈拖數量然今且置秪如重多少又如何秪對連皮鼻孔總七斤洞山因官人問有人修行否師曰待公作男子即修行拈云洎合恁麼承當洞山示衆知有佛向上人方有語話分僧問如何是佛向上人師曰非佛保福別云佛非法眼別云方便呼為佛拈云三箇老古錐盡力道不出者箇邊量也一人名位不得一人色聲不得一人同盤不得撿點將來猶未可在何故向上一路還著得如許淆訛麼洞山因僧問如何是玄中玄師曰如死人舌拈云滿口道不得咄更須截卻洞山因官人問三祖信心銘弟子擬注師曰才有是非紛然失心作麼生注法眼代云恁麼則弟子不注也拈云洞山秪知落草為人不覺通身泥水法眼無端插嘴理人閒事長無明當時官人倘向道注則且置畢竟喚什麼作心者兩老漢又作麼開口洞山因僧問亡僧遷化向甚麼處去師曰火後一莖茅拈云洞山把火後一莖茅遮蓋生緣露裸裸我當時若見為伊拈卻喚醒亡僧洞山見幽上座來遽起向禪床後立幽曰和尚為甚麼回避學人師曰將謂闍黎不見老僧拈云洞山背後納缺幽公當面吃瞞若不放過某甲也有三十洞山因僧問蛇吞蝦蟆救則是不救則是師曰救則雙目不睹不救則形影不彰拈云不彰且置秪者不睹可煞淆訛若直不睹則雙目現存若睹則話頭何在向者裏著得一句語便許闍黎救取蝦蟆蝦蟆不異闍黎闍黎與蝦蟆無別若著不得一句話莫道蝦蟆被吞闍黎亦無出身之路速道速道洞山曰一大藏教秪是箇之字拈云洞山恁麼判教可謂曲為今時爭奈賺人向葛藤窠裏重打一繞撫州曹山本寂禪師青五洞山價嗣因鏡清問清虛之理畢竟無身時如何山曰理即如此事作麼生曰如理如事山曰瞞曹山一人即得怎奈諸聖眼何曰若無諸聖眼無鑒得箇不恁麼山曰官不容針私通車馬拈云鏡清雖能置色身于空劫以前爭奈被曹山印破曹山固善出人事理何異四皓與儲皇定是非詗上座又且如何不如逐伴歸山去長笑一聲煙霧深曹山因僧問朗月當空時如何山曰猶是階下漢曰請師接上階山曰月落後相見拈云莫向明中鬥額須從暗裏翻身直令文彩縱橫不露金針雙鎖此曹山真切為人曲垂方便處也若夫全身兼到明暗俱泯又當另開隻眼曹山問強上座曰佛真法身猶若虛空應物現形如水中月作麼生說箇應底道理曰如驢覷井師曰道則太煞道秪道得八成曰和尚又如何師曰如井覷驢拈云直饒井驢絶覷更須密移一步何故寶殿無人空侍立不種梧桐免鳳來曹山因僧問古德道盡大地唯有此人未審是甚麼人師曰不可有第二月也曰如何是第一月師曰也要老兄定當曰作麼生是第一月師曰險拈云夜半騎牛鳥道歸曹山因僧問人人盡有弟子在塵中師還有否師曰過手來其僧過手師點曰一二三四五六足拈云曹山費盡口手打算依然遺失二人何故不見道點即不到當時者僧見道過手來即拍掌一下看伊又作何折合洪州雲居道膺禪師青五洞山價嗣令侍者送褲與一住菴道者道者曰自有娘生褲竟不受師卻令侍者去問娘未生時著箇甚麼道者無對後遷化燒得舍利持似師師曰直如饒得八斛四斗不如當初下一轉語好拈云雲居令侍者送褲不是好心此道者不受恰好但笑其自不唧溜說有娘生豈不惹出娘未生時禍事後來舍利且置秪如侍者來問詗上座娘未生前著箇甚麼答云如和尚著底雲居隨洞山渡水次山問水深多少師曰不濕山曰粗人師曰請師道山曰不乾拈云一則入水不動波一則楊波不撥水父子相為敲擊曲徹回互之機則不無爭奈總不出箇乾濕雲居因僧問如何是諸佛師師喝曰者田庫奴僧禮拜師曰你作麼生會僧曰者老和尚師曰元來不會僧作舞出去師曰沿臺盤乞兒拈云者僧雖解周旋回互不犯機輪爭奈被人壓良為賤當時倘待問你作麼生會便復禮拜出去雲居縱有手眼也難草草設施雲居參洞山山問汝名什麼師曰道膺山曰何不向上道師曰向上則不名道膺山深肯之拈云雲居道向上則不名畢竟名箇什麼若謂千聖也無開口分也秪是明得尊貴一路耳至如不居尊貴位又當如何論量噓詗上座不怕斷舌那雲居上堂孤迥迥峭巍巍僧問曰某甲不會師曰面前案山子也不識拈云雲居向絶頂無人處下箇真切入廛手爭奈者僧當面錯過雖然直饒會案山子猶有主山雲更遮峰巒直饒會得主山猶有向上一竅在且道畢竟作麼生孤迥迥峭魏魏可見不可睹無你棲泊處咄恁麼為人下注腳好與三十棒雲居因僧問一時包裏時如何師曰旋風千匝拈云雲居道處可謂周遮有餘但未免教人向外打繞象林則不然燈滅暗來千眼覷不及且道還有親疏否雲居因僧問山河大地從何而有師曰從妄想有曰與某甲想出一錠金得麼師便休去僧不肯拈云雲居若不休去盡大地山河被尼乾子輩判入無因甲裏雖然未免令雲門謂已是葛藤不能折合當時待道與某甲想出一錠金得麼但云你卻伶利管教者僧自作勝解撫州疏山匡仁禪師青五洞山價嗣僧問靈機未運時如何師曰夜半放白牛拈云疏山放則知時且問此牛兒什麼年畜得隨州青林師虔禪師青五洞山價嗣上堂祖師門下鳥道玄微功窮皆轉不究難明汝等諸人直須離心意識參絶凡聖路學方可保任若不如是非吾子息拈云青林雖則委曲為人覿面提挈且道離心意識是箇何物絶凡聖路向那裏安身若於此明得便有參學眼然須更買草鞋何故祖師門下說甚麼離絶青林因僧問學人竟往時如何師曰死蛇當大路勸子莫當頭曰當頭時如何師曰喪子命根曰不當頭時如何師曰亦無你回避處曰正恁麼時如何師曰失卻也曰未審向什麼處去師曰草深無覓處曰和尚也須隄防始得師撫掌曰一等是箇毒氣拈云者僧開死口于冷地可謂知恩報恩青林賣好手而接人不免疏時便險雖然要知撫掌後語卻是前箭猶可後箭深潭州龍牙山居遁禪師青五洞山價嗣僧問無邊身菩薩為甚麼不見如來頂相師曰汝道如來還有頂相麼拈云據龍牙道是則如來無頂相因甚古人云毗盧頂上行明眼衲僧試為端的龍牙因僧問如何是西來意師曰此問最苦報慈云此問最好拈云兩尊宿答處似則最切然撿點將來未的的在何故西來意苦好不涉龍牙因僧問維摩掌擎世界未審維摩向甚麼處立師曰道者汝道維摩掌擎世界拈云騎賊馬趕賊好手則不無龍牙若是象林但云擎世界則且置汝甚麼年中見維摩倘才擬答便驀頭打出高安白水本仁禪師青五洞山價嗣師將順世焚香白衆曰香煙絶處是吾涅槃時也言訖加趺而坐息隨煙滅拈云此老臨末尚要賣弄風流且勿論秪如息隨煙滅生平道業行解向甚處著落若定當得便見白水未曾涅槃益州北院通禪師青五洞山價嗣因辭洞山擬入嶺山曰善為飛猿嶺峻好看師良久山召通闍黎師應諾山曰何不入嶺去師因有省更不入嶺拈云直饒言下知歸已落飛猿嶺外京兆府蜆子和尚青五洞山價嗣混跡閩川逐日沿江岸採掇蝦蜆以充其腹拈云此老不妨奇怪試問伊當時得何道理便以蝦蜆充腹若見有衆生則道眼何在若謂本無衆生又爭奈目前何欲見蜆子受用須於此透過始得京兆府華嚴休靜禪師青五洞山價嗣師在洛浦作維那時一日白槌普請曰上間般柴下間鋤地第一座間聖僧作甚麼師曰當堂不正坐那赴兩頭機拈云首座開口延禍帶纍聖僧著忙維那白槌生端致連漆桶吃訝若是詗上座見問時秪向道動著坐著俱痛棒大家出手幾安閒瑞州九峰普滿禪師青五洞山價嗣僧問眼不到色塵時如何師指香臺曰面前是什麼曰請師子細師曰不妨遭人撿點拈云九峰指處倘作色看則喪失見精不作色看則弭縫眼孔直饒踢倒香臺猶須吃象林痛棒何故不見道喚作色得麼台州幽栖道幽禪師青五洞山價嗣師一日齊時入堂白槌曰白大衆衆舉頭師曰且吃飯拈云幽栖一翻特地但曰且吃飯看他何等親切雖然不許嚼著一粒米越州乾峰和尚青五洞山價嗣上堂法身有三種病二種光須是一一透得始解歸家穩坐須知更有向上一竅在雲門出問菴內人為甚麼不知菴外事師呵呵大笑門曰猶是學人疑處師曰子是甚麼心行門曰也要和尚相委師曰直須與麼始解穩坐門應喏喏拈云雲門雖有利口滑詞爭奈被乾峰鈍置若詗上座見道更有向上一竅但掩耳出去卻令乾峰疑著乾峰問衆僧輪回六趣具甚麼眼衆無對拈云我若見問向道佛眼亦不具何故若具佛眼即不見輪回乾峰因僧問如何是超佛越祖之談師曰老僧問聻曰和尚問則且置師曰老僧問尚不奈何說甚麼超佛越祖之談拈云用白拈手換快人睛乾峰慣得其便所以超佛越祖之談不妨當機說破乾峰因僧問十方婆伽梵一路涅槃門未審路頭在什麼處師以拄杖畫一畫云在者裏後僧持此語請益雲門門乃拈起扇子曰扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盤傾會麼拈云盡謂乾峰指路徑直不知秪者一畫已是淆訛不少後來雲門雖巧翻其拙也是制文字以代結繩轉見難堪且道畢竟如何切忌向兩老漢未拈拄杖及扇子時著倒乾峰因雲門問請師答話師曰到老僧也未曰恁麼則文偃在遲也師曰恁麼那恁麼那曰將謂候白更有候黑拈云妙唱不干舌善和不動唇二大老一期巧弄翻起威音以前白雪揭露彌勒今後陽春事存理應偏正雙融雖然如是細檢將來未免無風波匝匝明州天童咸啓禪師青五洞山價嗣簡大德問學人卓卓上來請師的的師曰我者裏一屙便了有甚麼卓卓的的曰和尚與麼答話更買草鞋行腳好師曰近前來僧近前師曰秪如老僧與麼祗對過在什麼處簡無對師便打拈云大小天童解屙不解了於時見道更買草鞋行腳好便呵呵大笑豈不令者僧冷地省來知撒潑相為乃反問過在甚麼處真成龍頭蛇尾天童因問伏龍甚處來曰伏龍來師曰還伏得龍麼曰不曾伏者畜生師曰且坐喫茶拈云伏龍將謂具獰惡神威不受人控制不知已上他茶中香餌當時恰好向道若不伏得和尚法座傾翻了也看天童老漢又如何管待吉州禾山和尚青五洞山價嗣僧問如何是西來意師曰禾山大頂拈云禾山好箇大頂青黯黯而風常顯露堂堂而雲更遮直饒具勢至目連神足也知渠踏不著何故無你著足處雖然禾山還須忌尊貴墮潭州寶蓋山和尚青五洞山價嗣僧問不居正位底人如何行履師曰紅炎叢中駿馬嘶拈云好箇畜生無漏廄中猶不伏卻來荒草裏藏頭露腳澧州欽山文邃禪師青五洞山價嗣與岩頭雪峰同到德山師出問天皇也恁麼道龍潭也恁麼道未審和尚作麼生道山曰汝試舉天皇龍潭道底看師擬議山便打師被打歸延壽堂曰是即是打我太煞岩頭曰你恁麼他後不得道見德山來拈云當時入門便棒豈不千古是德山若待擬議方打何曾醫得死馬倘欽山是箇仙陀你試舉天皇龍潭道底看但云幸在學人前徵此一問若他人便笑和尚去也不唯令老漢咬舌亦免得自家喫屈欽山因僧參師豎起拳又伸掌曰開即成掌五指參差復握拳云如今為拳必無高下汝道欽山還通商量也無僧近前卻豎起拳師曰你恁麼秪是箇開合漢拈云就一手說差別智已全彰欽山得稱善巧然為人處猶尚缺在當者僧卻擬豎拳亟應喝云隨語生解有甚麼限拳未豎時道將一句來豈但撥開一時活路亦救得後來一隊漢不死向拳頭下欽山因僧寫師真呈師曰還似我也無僧無對師自代曰衆僧看取拈云者僧恰好向云莫道似我看來亦不似渠何故若似和尚便無藏身處老漢後來自代衆僧看取真箇不識羞恥瑞州九峰通玄禪師青五洞山價嗣僧問自心他心得相見否師曰自己尚不見他人何可觀拈云詗上座則不然他人且莫論汝今自心見在何處作何面貌咄切莫亂卜度洛京白馬遁儒禪師青五洞山價嗣僧問如何是衲僧本分事師曰十道不通風啞子傳來信曰傳甚麼信師乃合掌頂戴拈云白馬答處則固玄盡善則未在何故不見道切忌從他覓若待傳來堪作甚麼撫州金峰從志禪師青六曹山寂嗣一日拈起枕子示僧曰一切人喚作枕子金峰道不是僧曰未審和尚喚作什麼師拈起枕子僧曰恁麼則依而行之師曰你喚作什麼曰枕子師曰落在金峰窠裏拈云前此道不是原因眼正後卻拈枕子斷不隨邪者僧未諳金峰曲示結角羅紋不犯當頭錦縫又寧能免不落他窠裏而別有脫身活路乎當時倘道和尚即不妨向某甲喚甕作鐘某甲終不敢對和尚指鹿為馬老漢又如何折合金峰因僧問訊次乃把住曰輒不得向人道我有一則因緣舉似你僧作聽勢師與一掌僧曰為什麼打某甲師曰我要者話行拈云當時若道某甲已為流通和尚幸不有疑好金峰者一掌又向何處著落金峰因僧掃地次師問你作甚麼僧豎起苕帚師曰猶有者箇在曰和尚適來見箇甚麼師豎起拄杖拈云者僧好箇苕帚秪是不會受用當時見問作甚麼便放下叉手而立金峰縱有拄杖亦換人眼睛不得撫州曹山慧霞禪師青六曹山寂嗣僧問四山相逼時如何師曰曹山在裏許曰還求出也無師曰在裏許即求出拈云曹山求出即不無秪是無路象林則不然東方來者東方合南西北方依次合何故不許同流成合污應知隨色是摩尼襄州鹿門處真禪師青六曹山寂嗣僧問和尚百年後向甚麼處去師曰山下李家使牛去曰還許學人相隨也無師曰汝若相隨莫同頭角曰諾師曰合到甚麼處曰佛眼辨不得師曰若不放過亦是茫茫拈云鹿門雖有為人之口且無活人之手者僧道佛眼辨不得即應驀脊便棒何故不可教伊繫在無影樹下雖然秪者亦是茫茫且道是成褫伊非成褫伊明眼者不妨撿點瑞州洞山道延禪師青六曹山寂嗣因曹山垂語云有一人向萬丈崖頭騰身直下此是甚麼人衆無對師出曰不存山曰不存箇甚麼師曰始得撲不碎山深肯之拈云洞山固善保任未免已落崖頭若是活解翻身底漢只消道箇墮也破也華州草菴法義禪師青六曹山寂嗣僧問如何是祖師西來意師曰爛炒浮漚飽滿喫拈云炒則且從敢保草菴嚼不破撫州曹山光慧禪師青六曹山寂嗣僧問如何是妙明真性師曰款款莫磕損拈云一等是堪笑喚琉璃作水晶撫州曹山智炬禪師青六曹山寂嗣僧問如何是如來語師曰猛風可繩縛拈云縛則也不難切忌瞥地失卻繩子曹山因僧問如何是聲前一句師曰恰似不道拈云詗上座恰好要道秪恐你眼聞衡州育王弘通禪師青六曹山寂嗣僧問如何是急切處師曰針眼裏打筋斗拈云直饒一打萬八千也秪是針眼裏伎倆詗上座從來不解捏怪但秪道眼毛頭上撲流星育王因僧問如何是本來身師曰回光影裏見方親拈云者裏有三十棒要打育王為什麼聻不合教者僧向光影中作活計詗上座即今也好喫三十棒為伊添注腳秪如本來身豈待回光處見若待回光處見是始覺身非本來身矣畢竟如何遍界不逢常覿露洪州鳳棲山同安丕禪師青六雲居膺嗣僧問如何是觸目菩提師曰面前佛殿拈云撞瞎雙眸兩眼看同安因僧問一見便休去時如何師曰是也更來者裏作麼拈云者僧恰好進語若不來和尚疑某甲未休在同安因僧問將來不相似不將來時如何師曰甚麼處著拈云好箇答頭秪是撮不上手同安因僧問如何是和尚家風師曰金雞抱子歸霄漢玉兔懷胎入紫薇曰忽遇客來如何秪待師曰金果早朝猿摘去玉華晚後鳳銜歸拈云滿而不溢虛而常盈同安氣宇如王開口婉然尊貴故其尋常受用初無珍御可驚已令短販樵人真自嗟慚無分秪今象林家風也不可太過不及且道又作麼生繞屋泉長飛玉液照床月每瀉銀濤忽遇客來將何秪待無米油餈充小頓空盤胡餅足饑餐同安因僧問未有者箇時作麼生行履師曰尋常又作麼生曰恁麼則不改舊人也師曰作何行履拈云劫前運步須知步步成蹤市裏橫身要識身身無影同安慣拈洞嶺初秋草引使泥牛出海濤則且置獨惜者僧將成九仞之山不進一簣之土為可太息耳雖然到此時也三世諸佛直得口挂壁上噓恁麼那同安因僧問才有言詮盡落今時不落今時請師直說師曰木人解語非干舌石女拋梭不亂絲拈云見聞不及處聲色崢嶸事理全彰時覺知寂滅咄倒騎駿馬驟岑樓踏碎潭中無影樹廬山歸宗寺懷惲禪師青六雲居膺嗣僧問無佛無衆生時如何師曰甚麼人如此拈云歸宗要從碧潭深處鉤出獰龍堪笑者僧素非神物當時拂袖出去豈不令老漢疑著池州嵇山章禪師青六雲居膺嗣師在投子作柴頭子同喫茶次謂師曰森羅萬象總在裏許師潑卻茶曰森羅萬象在甚麼處子曰可惜許一碗茶拈云當時放下茶碗又作麼生雖然秪如投子道可惜許為森羅裏道森羅外道試商量看南康軍雲居懷嶽禪師青六雲居膺嗣僧問如何是無根樹師曰處處著不得拈云若是無根樹甚處著不得如今著不得且置畢竟喚什麼作無根樹還會麼天帝有心難可致月宮無影更難尋杭州佛日本空禪師青六雲居膺嗣參雲居作禮問曰二龍爭珠誰是得者居曰卸卻業身來與子相見師曰業身已卸居曰珠在甚麼處師無對同安代云回頭即沒交涉拈云珠在什麼處適才已呈和尚佛日當時下得此語也省得同安賊過後放炮南康軍雲居道簡禪師青六雲居膺嗣僧問孤峰獨宿時如何師曰閒卻七間僧堂不宿阿誰教汝孤峰獨宿拈云善發人者不在於華詞雲居秪就日逐平常邊提箇閒卻句便令者僧曠劫攀緣立摧于當念雖然如是撿點將來猶缺為人為徹在何故不見道靈雀不栖無影林蘄州廣濟禪師青六雲居膺嗣僧問不識不見請師道出師曰不昧曰不昧時作麼生師曰汝喚作甚麼拈云和尚放某甲過即便喚何故慮觸尊諱歙州朱溪謙禪師青六雲居膺嗣韶國師行腳時到參值犬咬靈鼠聲韶便問是什麼聲師曰犬咬靈鼠聲曰既是靈鼠因甚麼卻被犬咬師曰咬殺也曰好箇犬師便打韶曰莫打某甲話在師便休拈云朱溪橫身為物可謂曲盡婆心國師搖舌當機未免空挨屈棒二大老驀地激揚善圓賓主固足仰若是象林見道莫打某甲便更與一棒豈不為太平寰宇特斬癡頑乎朱溪因造佛殿畢一僧同看師曰此殿著得什麼佛曰著即不無有人不肯師曰我不問那箇人曰恁麼則某甲亦未曾秪對和尚拈云善提綿密之機使功位齊轉發明於言下朱溪不失為哲匠矣但者僧若在象林門下便放過不得何故取次和酬小人智巧隨州護國守澄禪師青六疏山仁嗣因演化在湖南報慈值上堂次化出問如何是真如佛性慈云誰無不契遂請益師師曰汝但問來化理前問師曰誰有化於言下大悟拈云報慈護國可謂竭力為人但說法則不可何故道有道無與真如何涉演化當時言下契悟亦自喫枉不少護國因僧問如何是梵音相師曰河北驢鳴河南犬吠拈云異類中行且放護國若論梵音猶是弄巧成拙應更喫棒為何如此南北翻譯語滯鄉談使勝義不顯洛京靈泉歸仁禪師青六疏山仁嗣師初問疏山枯木生花始與他合是這邊句是那邊句山曰亦是者邊句師曰如何是那邊句山曰石牛吐出三春霧靈雀不栖無影林拈云那邊消息鐵蓋銀函不因疏山揭露石牛踏便無地靈雀飛豈有天雖然也秪提唱得一邊靈泉因僧問如何是靈泉心印師曰不傳不受曰或遇交代時如何師曰淮南船子看洛陽拈云靈泉不妨奇怪且道淮南船子具什麼眼若是無情眼即不應能看若是有情眼船本木做又作麼生為看於此定當得心印即日交代撫州疏山證禪師青六疏山仁嗣僧問如何是聲色混融句師曰不辨消不及拈云入理深談還他證老若是覿面提持象林別資一路風來水面時洪州百丈明照安禪師青六疏山仁嗣僧問萬法歸一一歸何處師曰未有一箇人不問拈云問在答處答在問邊百丈慣得其便若是一向如斯連青州衫子俱被詗上座勘破瑞州黃檗山慧禪師青六疏山仁嗣參疏山問剎那便去時如何山曰逼塞虛空汝作麼生去師曰逼塞虛空不如不去山便休師下堂參第一座座曰適來秪對甚奇特師曰此乃率爾敢望慈悲開示愚昧座曰一剎那間還有擬議否師於言下頓省拈云逼塞虛空且道疏父子當時向甚麼處相見有能道得十方世界在你眉睫上如或不然當下被剎那鈍置襄州石門獻蘊禪師青六青林虔嗣初問青林如何用心即得齊於諸聖林仰面良久曰會麼師曰不會林曰去無子用心處師禮拜乃契悟拈云直饒伶利向老漢仰面處省去已好喫象林手中苕帚柄況禮拜方磕著堪甚麼雕琢雖然青林也不能無過既無用心處良久作甚麼石門因僧問猛虎當軒時如何師曰性命不存曰恁麼則遭他毒手師曰一任咬嚼拈云石門行劍刃上事可謂任緣放曠然若不從遷祖境智非一孰云去來處再蘇起來未免郎當太煞韶州光龍諲禪師青六青林虔嗣上堂良久曰不煩珍重拈云龍光欲截斷玄微不知更愈形文彩當時倘有人向道和尚話墮也老漢又如何折合襄州萬銅山廣德延禪師青六青林虔嗣僧問盡大地是箇死尸向甚麼處葬師曰北邙山下千丘萬丘拈云廣德恁麼為人稱堪輿先生尚不可何故千丘萬丘秪是亂葬墳未曾點出正穴焉能發得尊貴象林則不誤主固教伊當處死當處埋倘有人信得好急向者裏死來京兆重雲智暉禪師青六白水仁嗣常創溫室施水給藥為事有比丘患白癩衆惡之唯師與之摩洗如常俄有神光異香既而訝之遂失所在遺瘡痂馨香酷烈遂聚而塑觀音像以藏之拈云遇白癩勉自力洗之見異香塑大士藏之雖似好事讓他人寧知自己失卻鼻孔重雲被比丘惑亂則且置且道此比丘畢竟是什麼人若能識得尊貴位中留不住如識不得又隨明月宿蘆花潭州報慈藏嶼禪師青六龍牙遁嗣僧問情生智隔想變體殊秪如情未生時如何師曰隔曰情未生時隔箇甚麼師曰者箇梢郎子未遇人在拈云者僧既向鏡裏迷頭報慈不合就空中著楔若是象林也不消得何故返照入江翻石壁歸雲擁樹失山村報慈因僧問古人面壁意旨如何師良久卻召僧僧應諾師曰汝去別時來拈云者僧若是仙陀於良久次向道和尚好睡便出去老漢縱欲瞞人知做伎倆不得襄州含珠山審哲禪師青六龍牙遁嗣僧問如何是無位真人師曰別安排又爭得曰不安排時如何師曰無位真人拈云如今不好觸諱倘問不安排時如何但云某在斯雖然我且問你者真人甚麼年行道洪州同安威禪師青六九峰滿嗣僧問祖意教意是同是別師曰玉兔未曾知曉意金烏爭肯夜頭明拈云象林不似同安金雕翡翠玉繡麒麟倘有問時秪向道函人唯恐傷人矢人唯恐不傷人京兆府香城和尚青六北院通嗣初參北院問曰一似兩箇時如何院曰一箇賺汝師乃有省拈云香城被賺則且置北院恐亦未免猶自喫瞞何故曾為蕩子偏憐客自愛貪杯惜醉人瑞州上藍慶禪師青七洞山延嗣師初參雪峰問如何是雪峰的的意峰以拄杖子敲師頭師應諾峰大笑拈云上藍應諾真箇鹵莽承當雪峰大笑直是奈何不得若要明的的意總須來象林喫拄杖襄州谷隱智靜禪師青七鹿門真嗣僧問如何是指歸之路師曰莫用伊曰還使學人到也無師曰甚麼處著得汝拈云者僧好一片穩密田地自是不會受用無端被谷隱遍撒熱鐵蒺藜至今著腳不得且道當時下得什麼語始得放曠自由咦出身猶可易脫體道應難益州崇真禪師青七鹿門真嗣僧問如何是禪師曰澄潭釣玉兔拈云撮得電光是好手襄州鹿門志行談禪師青七鹿門真嗣僧問如何是清淨法身師曰戌亥年生拈云鹿門好箇清淨法身隨著支干裏轉詗上座尊造又且如何子時當正位不貴是威音蘆山佛手巖行因禪師青七鹿門真嗣僧問如何是對現色身師豎一指拈云若向佛手豎指處著倒捏目生華不向豎指處放參拍盲求路直饒總不作箇見也是烏龜眠死水畢竟如何山從人面起雲傍馬頭生洪州同安志禪師青七同安丕嗣僧問凡有言句盡落今時學人上來請師直指師曰目前不現句後不迷曰向上事如何師曰迥然不換標的即差拈云同安提持向上一路可謂應無跡用無痕但撿點將來未免猶彰標的袁州仰山和尚青七同安丕嗣僧問如何是仰山境師曰白雲峰下猿啼蚤碧嶂巖前虎起遲拈云者裏若作境會參學事畢全未還家若不作境會擇法眼無坐堂安妥且道作境會即是不作境會即是若人道得接手句許伊親見仰山象林更與三十棒隨州雙泉山道虔禪師青七嵇山章嗣僧問如何是希有底事師曰白蓮花向半天開拈云老老大大賺人向虛空裏踏步廬山歸宗弘章禪師青七歸宗惲嗣僧問小船渡大海時如何師曰較些子曰如何得渡師曰不過來拈云那邊消息歸宗固善提撕若要截斷洪流不得動著柁柄隨州智門守欽禪師青七護國澄嗣僧問兩鏡相照為甚麼中間無像師曰自己亦須隱曰鏡破臺亡時如何師豎起拳頭拈云掃除建立回互交加自非作家老手無能應機自在詗上座于智門落草處更資一路兩鏡相照為什麼中間無像頭角不堪鏡破臺亡時如何混然無諱且道還通商量也無不妨明眼隨州護國知遠演化禪師青七護國澄嗣僧問乾坤休駐意宇宙不留心時如何師曰總是戰爭收拾得卻因歌舞破除休拈云向者裏著得一隻眼好箇不快活漢郢州大陽慧堅禪師青七靈泉仁嗣初在靈泉入室次泉問甚麼處來師曰僧堂裏來泉曰為甚麼不築著露柱師於言下有省拈云大陽恁麼省去於靈泉門下可稱快俊若在象林此間正好喫棒何故待人叮囑見淆訛氣宇堪來作何用大陽因僧問不借時機用如何話祖宗師曰老鼠咬腰帶拈云象林則不然老鼠勘破阿姨禪瑞州五峰紹禪師青七五峰遇嗣僧問如何是第一義師拍禪床云若不是仙陀千里萬里拈云五峰好一拍秪是無人和得詗上座秪今和去也遂拍膝云若不是仙陀落七落八襄州廣德義禪師青七廣德延嗣僧問如何是大寂滅海師曰鬧市走馬不觸一人拈云我當時倘在向道烏有先生今在縣裏告和尚不合私占官田他若眼目定動教露柱連馬擒下待樓至佛來乃發落廣德因僧問懸崖峭峻還具得失也無師曰欣逢良便好與一推拈云具驅耕奪食之作方可以接人天無撒手翻身之能不足以稱師子廣德逢危知不吝慈悲矣爭奈者僧一死更不再活廣德因僧問諦信底人信箇甚麼師曰莫道冰無火斯須紅炎生拈云直饒信得冰即是火猶未免依生物解況待斯須轉來堪作甚麼襄州廣德周禪師青七廣德延嗣僧問聞話不覺時如何師曰遍界沒聾人誰是知音者曰如何是知音者師曰斷絃續不得歷劫響泠泠拈云續不得且置且問此絃斷來多少時若人定當得便信敲空有韻擊水無聲若定不得薔薇與桃李對談總然春夢襄州石門慧徹禪師青七石門蘊嗣僧問年窮歲盡時如何師曰東村王老夜燒錢拈云石門酬機慣用無星稱子象林則不然有問年窮歲盡時如何但向道一般歲序如流去何許人家特地愁唐州大乘山和尚青七含珠哲嗣僧問如何是四方八面事師曰升子裏𨁝跳斗子裏轉身拈云大乘雖能逆往順來上翻下轉秪不出箇升斗若論四方八面事須是門前剎竿上布幡子鼎州梁山緣觀禪師青八同安志嗣僧問如何是衲衣下事師曰密拈云千尺烏龍井覷著立時盲梁山示衆南來者與伊三十棒北來者與伊三十棒拈云象林門下直饒非南北來者與伊三十棒者裏還有三十棒且道與什麼人若能識得此人三十棒一棒也不較懷安軍雲頂德敷禪師青八護國遠嗣成都帥請就衙升座有樂營將出禮拜起回顧下馬臺曰一口吸盡西江水即不問請師吞卻階前下馬臺師展兩手唱曰細抹將來營將猛省拈云老漢若不解開火裏蝍蟟口幾成吞吐不下營將恁麼省去也是逼狗上高墻潭州北禪契念禪師青八大陽堅嗣僧問如何是不墜古今句師曰十五十六日月相逐拈云北禪雖稱作家宗師爭奈隨日月下走如今有問象林但向道山青水緑襄州石門紹遠禪師青八石門徹嗣僧問如何是宗乘中一句師曰石火夜燒山大地齊合掌拈云若作佛法商量纍他石門眉毛墮落潭州北禪懷感禪師青八石門徹嗣僧問如何是諸聖為人底句師曰紅輪當萬戶光燭本無心拈云若恁麼流布將去曹溪一路平沉者僧未具參學眼且置北禪好與三十棒太原筠首座青八石門徹嗣一日荷鉏入園僧問三身中那一身去作務師拄鉏而立僧曰莫便當也無師攜鉏便行拈云功位齊轉照用臨時太原可稱作者但攜鉏便行為人處則未徹當時見道莫便當也無倒拈鉏柄驀頭便打豈不令者僧知格外風規東京普淨常覺禪師青八歸宗章嗣給事陶穀問曰經云離一切相則名諸佛今目前諸相紛然如何離得師曰給事見箇甚麼陶欣然仰重拈云問得恰好答得也奇但撿點將來秪成得箇問答我者裏則不然諸相不惡用離作麼倘若更問畢竟如何呵呵大笑云詗上座要留舌頭喫飯襄州谷隱知儼禪師青八谷隱靜嗣僧問千山萬水如何登陟師曰舉步便千里萬里曰不舉步時如何師曰亦千里萬里拈云谷隱秪知竭力為人不覺全身落草郢州大陽警延禪師青九緣山觀嗣問僧甚處來曰洪州師日先師在麼曰在師曰在即不無請渠出來我要相見僧曰聻師曰者箇猶是侍者僧無對師曰喫茶去拈云者裏合代這僧兩轉語先師在麼也知和尚掛念請渠出來我要相見和尚大似不肯先師不然降尊就卑又爭得大陽因僧問如何是和尚家風師曰滿瓶傾不出大地沒饑人拈云大陽家風儘有滋味秪是無啖噉處澧州藥山利昱禪師青九梁山觀嗣僧問格外之談乞師垂示師曰要道也不難曰恁麼則萬仞碧潭許垂一線也師曰大衆笑汝拈云者僧被藥山鈍置則已格外之談畢竟作麼生道三面黧奴腳踏月兩頭白牯手拏煙鼎州羅紋得珍山主青九梁山觀嗣僧問親切處乞師指示師曰老僧元是廣南人拈云羅紋被者僧一問直得腳跟露出雖然如是回頭即沒交涉鄧州廣濟禪師青九石門遠嗣僧問如何是修行師曰庭柱傷寒拈云庭柱傷寒和尚要須替他忌口始得者僧倘能下得此語廣濟當時立地汗流濠州南禪聰禪師青九北禪感嗣僧問如何是大道根源師曰雲興當午夜石虎叫連宵拈云南禪雖則善指根源要且不出三種病人疑處襄州谷隱契崇禪師青九谷隱儼嗣僧問如何是祖師西來意師曰番人皮裘胡人著曰學人不會此理如何師曰聾人側耳啞人歌拈云祖師好箇西來意無端被谷隱將二種病人樂事抹煞引得一類偏空枯寂漢亂向絶音聞邊錯會
